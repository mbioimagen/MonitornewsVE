<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataMonitorVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .dropdown:hover .dropdown-menu { display: block; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

    <!-- Header -->
    <header class="bg-[#14171c] text-white p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">DataMonitorVE</h1>
            <div class="flex gap-2">
                <!-- Dropdown -->
                <div class="relative group">
                    <button class="bg-violet-600 px-4 py-2 rounded text-sm font-bold flex items-center gap-1 hover:bg-violet-700">
                        Buscar desaparecidos ▾
                    </button>
                    <div class="absolute right-0 mt-2 w-64 bg-white text-gray-800 rounded shadow-lg hidden group-hover:block z-50 p-2">
                        <div class="p-2 border-b">
                            <a href="https://tebusco.app/" target="_blank" class="block font-bold text-sm">1. Te Busco</a>
                            <p class="text-[10px] italic text-gray-500">Creador: [Nombre Creador]</p>
                        </div>
                        <div class="p-2">
                            <a href="https://red-de-esperanza-lime.vercel.app/" target="_blank" class="block font-bold text-sm">2. Red de Esperanza</a>
                            <p class="text-[10px] italic text-gray-500">Creador: [Nombre Creador]</p>
                        </div>
                    </div>
                </div>
                <button class="bg-white text-gray-900 px-4 py-2 rounded text-sm font-bold">Exportar Reporte</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Map Panel -->
        <div class="md:col-span-2 bg-white p-6 rounded shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold mb-4">Mapeo de afectación</h2>
            <div id="map" class="h-[400px] w-full bg-gray-200 rounded"></div>
        </div>

        <!-- Info Panel -->
        <div class="bg-white p-6 rounded shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold mb-4">Protección Infantil</h2>
            <p class="text-sm text-gray-600 leading-relaxed">
                Alertas de organismos serios (UNICEF, Cecodap) sobre riesgo de separación familiar.
            </p>
        </div>
    </main>

    <script>
        const map = L.map('map').setView([10.48, -66.86], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
    </script>
</body>
</html>
