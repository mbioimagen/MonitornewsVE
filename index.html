<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SismoVE - Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .map-container { height: 500px; width: 100%; border-radius: 0.5rem; overflow: hidden; border: 1px solid #e5e7eb; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-satellite-dish text-red-500"></i> DataMonitorVE</h1>
            <nav class="flex gap-4">
                <a href="#" class="hover:text-red-400">Dashboard</a>
                <a href="#" class="hover:text-red-400">Noticias</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        <!-- Estadísticas -->
        <div class="stats-grid">
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-red-500">
                <p class="text-xs text-gray-500">Víctimas (Promedio)</p>
                <h2 class="text-2xl font-bold">920+</h2>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-yellow-500">
                <p class="text-xs text-gray-500">Heridos Estimados</p>
                <h2 class="text-2xl font-bold">3,360</h2>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-slate-800">
                <p class="text-xs text-gray-500">Edificios Colapsados</p>
                <h2 class="text-2xl font-bold">250+</h2>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500">
                <p class="text-xs text-gray-500">Equipos de Rescate</p>
                <h2 class="text-2xl font-bold">17</h2>
            </div>
        </div>

        <!-- Layout principal -->
        <div class="main-layout">
            <!-- Mapa -->
            <div>
                <div class="bg-white p-2 rounded-lg shadow mb-4">
                    <div id="map" class="map-container"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="font-bold mb-4">Últimos Informes</h2>
                <div id="feed-container" class="space-y-4">
                    <!-- Contenido -->
                    <div class="p-3 border-b border-gray-100">
                        <h4 class="font-bold text-sm">Punto de Acopio - UCV</h4>
                        <p class="text-xs text-gray-600">Plaza Rectorado UCV, Caracas</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([10.48, -66.90], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Puntos de ejemplo
        L.marker([10.48, -66.90]).addTo(map).bindPopup("Caracas: Centro de Acopio UCV");
        L.marker([10.16, -68.00]).addTo(map).bindPopup("Valencia: Punto de recolección");
        L.marker([10.06, -69.34]).addTo(map).bindPopup("Barquisimeto: Cáritas");
    </script>
</body>
</html>
