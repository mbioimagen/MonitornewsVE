<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DataMonitorVE · Sala de Situación Sismo 2026</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:#14171c; --ink-soft:#4a5160; --paper:#eef1f4; --card:#ffffff;
    --line:#d8dde3; --alert:#d6233a; --blue:#1f6feb; --green:#1a8a4a; --violet:#6c4cd6;
    --mono:"IBM Plex Mono",monospace; --sans:"Inter",sans-serif;
  }
  body{ font-family:var(--sans); background:var(--paper); margin:0; }
  
  /* Dropdown Styles */
  .dropdown { position: relative; display: inline-block; }
  .dropbtn { 
    background:#6c4cd6; color:#fff; border:0; padding:11px 16px; border-radius:8px; 
    font-family:var(--mono); font-weight:600; font-size:13px; cursor:pointer; 
    display:flex; align-items:center; gap:8px; 
  }
  .dropdown-content {
    display: none; position: absolute; background-color: #fff; min-width: 280px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.2); border-radius: 8px; z-index: 1001;
    padding: 10px; margin-top: 5px; right: 0; border: 1px solid var(--line);
  }
  .dropdown:hover .dropdown-content { display: block; }
  .dropdown-item { display: block; padding: 10px; color: var(--ink); font-weight: 600; font-size: 13px; }
  .dropdown-item:hover { background: var(--paper); border-radius: 4px; }
  .credit { font-size: 10px; color: var(--ink-soft); margin-bottom: 8px; display: block; padding-left: 10px; font-style: italic; }

  /* Layout Base */
  .masthead{ background:#11151c; color:#fff; padding:18px 20px; border-bottom:3px solid var(--alert); }
  .masthead-inner{ max-width:1280px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
  .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1280px; margin: 20px auto; padding: 0 20px; }
  #map { height: 500px; background: #eee; border-radius: 8px; }
  .panel { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid var(--line); }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1280px; margin: 20px auto; padding: 0 20px; }
</style>
</head>
<body>

  <header class="masthead">
    <div class="masthead-inner">
      <div class="brand"><h1>DataMonitorVE</h1></div>
      <div class="head-actions">
        
        <!-- Botón Desplegable -->
        <div class="dropdown">
          <button class="dropbtn">Buscar desaparecidos ▾</button>
          <div class="dropdown-content">
            <a class="dropdown-item" href="https://tebusco.app/" target="_blank">1. Te Busco (App de búsqueda)</a>
            <small class="credit">Creador: [Nombre Creador/Org]</small>
            <a class="dropdown-item" href="https://red-de-esperanza-lime.vercel.app/" target="_blank">2. Red de Esperanza</a>
            <small class="credit">Creador: [Nombre Creador/Org]</small>
          </div>
        </div>

        <button class="btn-method" onclick="alert('Funcionalidad de exportación activa')">Exportar Reporte</button>
      </div>
    </div>
  </header>

  <section class="stat-grid" id="stats">
    <!-- Aquí irían tus tarjetas de estadísticas -->
  </section>

  <main class="grid-layout">
    <div class="panel">
      <h2>Mapeo de afectación</h2>
      <div id="map"></div>
    </div>
    <div class="panel">
      <h2>Protección Infantil</h2>
      <div id="child-content">
         <p>Alertas de organismos serios (UNICEF, Cecodap) sobre riesgo de separación familiar.</p>
      </div>
    </div>
  </main>

<script>
  // Inicialización simple del mapa
  const map = L.map('map').setView([10.48, -66.86], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
</script>
</body>
</html>
